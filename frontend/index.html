<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fix the title -->
    <title>Death is a Deadline — Life is short. Travel now.</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/android-chrome-512x512.png"
    />

    <!-- SEO -->
    <meta
      name="description"
      content="Student-only blind bidding for hotel rooms. Verify your .edu, name your price, get instant accept or reject. Life is short. Travel now."
    />
    <meta
      name="keywords"
      content="student travel, cheap hotels, hotel bidding, .edu discount, student deals"
    />

    <!-- Open Graph (for sharing on social / iMessage previews) -->
    <meta property="og:title" content="Death is a Deadline" />
    <meta
      property="og:description"
      content="Life is short. Travel now. Student-only blind bidding for hotel rooms."
    />
    <meta
      property="og:image"
      content="https://death-is-a-deadline-mvp.vercel.app/og-image.jpg"
    />
    <meta
      property="og:url"
      content="https://death-is-a-deadline-mvp.vercel.app/"
    />
    <meta property="og:type" content="website" />

    <!-- Twitter/X card (important for viral sharing) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Death is a Deadline" />
    <meta
      name="twitter:description"
      content="Student-only hotel bidding. Name your price. Life is short. Travel now."
    />
    <meta
      name="twitter:image"
      content="https://death-is-a-deadline-mvp.vercel.app/og-image.jpg"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
